name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */6 * * *"  # Runs every 6 hours
  workflow_dispatch:  # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Generate Pacman Graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#f1e05a&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9&style=pacman
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f1e05a&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&style=pacman
            
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
